name: CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Code quality check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint backend
        run: flake8 backend/server.py backend/test_server.py backend/smoke_test.py --statistics

  build:
    name: Build and verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python syntax
        run: python -m py_compile backend/server.py && python -m py_compile backend/test_server.py

      - name: Verify frontend assets exist
        run: |
          test -f frontend/index.html
          test -f frontend/style.css
          test -f frontend/app.js

      - name: Verify server starts
        run: |
          cd backend
          python -c "
          import server
          print('Server module loaded successfully')
          print(f'DB path: {server.DB_PATH}')
          print(f'Frontend dir: {server.FRONTEND_DIR}')
          "

  test:
    name: Automated tests
    runs-on: windows-latest
    needs: [lint, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run all tests
        run: python -m unittest discover -s backend -p "test_*.py" -v

  deploy:
    name: Deploy to Huawei Cloud
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check deployment config
        id: check
        run: |
          if [ -n "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "Deployment secrets not configured, skipping deploy."
          fi

      - name: Checkout
        if: steps.check.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Deploy via SSH
        if: steps.check.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: ANTHROPIC_AUTH_TOKEN
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            if [ -n "$ANTHROPIC_AUTH_TOKEN" ]; then
              cat > backend/config.json <<EOF
            {
              "anthropic_auth_token": "$ANTHROPIC_AUTH_TOKEN",
              "anthropic_base_url": "https://api.deepseek.com/anthropic",
              "anthropic_api_format": "anthropic",
              "anthropic_model": "DeepSeek-v4-pro"
            }
            EOF
            fi
            sudo systemctl restart study-seat

  smoke-test:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check config
        id: check
        run: |
          if [ -n "${{ secrets.SMOKE_BASE_URL }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "SMOKE_BASE_URL not configured, skipping."
          fi

      - name: Checkout
        if: steps.check.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run smoke test
        if: steps.check.outputs.configured == 'true'
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: python backend/smoke_test.py
