name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend unit and API tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run backend tests
        run: python -m unittest discover -s backend -p "test_*.py" -v

  smoke-test:
    name: Deployed smoke test
    runs-on: ubuntu-latest
    needs: backend-tests
    env:
      SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
      SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
      SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run smoke test
        if: ${{ env.SMOKE_BASE_URL != '' }}
        run: python backend/smoke_test.py

      - name: Skip smoke test
        if: ${{ env.SMOKE_BASE_URL == '' }}
        run: echo "SMOKE_BASE_URL secret is not configured; skipping deployed smoke test."
